name: POSSE

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "_micro/**/*.md"
      - ".github/posse/**"
      - ".github/workflows/posse.yml"

permissions:
  contents: write

concurrency:
  group: posse-${{ github.ref }}
  cancel-in-progress: false

jobs:
  syndicate:
    if: "!contains(github.event.head_commit.message, '[skip posse]')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .github/posse

      - name: Run POSSE sync
        working-directory: .github/posse
        env:
          MICRO_POSTS_DIR: ../../_micro
          SITE_URL: https://seanmonstar.com
          BSKY_IDENTIFIER: seanmonstar.com
          BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD }}
          MASTODON_URL: https://masto.ai
          MASTODON_TOKEN: ${{ secrets.MASTODON_TOKEN }}
        run: cargo run --locked

      - name: Commit sync metadata
        run: |
          if git diff --quiet -- _micro; then
            echo "No POSSE metadata changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _micro
          git commit -m "Update POSSE syndication URLs [skip posse]"
          git push
